<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Agenda</title>
  <style>
    :root {
      --primary: #4a6cf7;
      --bg: #f8f9fa;
      --text: #333;
      --card: white;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --text: #e0e0e0;
      --card: #1e1e1e;
      --primary: #6b8cff;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h2 { margin: 0; font-size: 1.4rem; }
    .theme-toggle {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .container {
      max-width: 1100px;
      margin: 15px auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .calendar { background: var(--card); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
    }
    .calendar-header button {
      background: none;
      border: none;
      font-size: 28px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      color: var(--primary);
      cursor: pointer;
    }
    .calendar-header h2 { margin: 0; font-size: 1.35rem; font-weight: 600; }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f1f3f5;
      text-align: center;
      padding: 10px 0;
      font-weight: 600;
    }
    [data-theme="dark"] .weekdays { background: #2a2a2a; }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 8px;
      background: var(--card);
    }

    .day {
      background: var(--card);
      padding: 12px 6px;
      min-height: 85px;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.3s;
    }

    .day.today { background: #e3f0ff; font-weight: bold; }
    [data-theme="dark"] .day.today { background: #1e3a8a; }

    /* Novo: Dia verde quando todos os compromissos estão feitos */
    .day.all-done {
      background: #d4f4dd !important;
      color: #166534;
      font-weight: bold;
    }
    [data-theme="dark"] .day.all-done {
      background: #14532d !important;
      color: #86efac;
    }

    .day.has-events::after {
      content: '';
      position: absolute;
      bottom: 8px;
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
    }

    .sidebar {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 20px;
    }

    .selected-date {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 15px;
      color: var(--primary);
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      cursor: pointer;
      width: 100%;
      margin: 8px 0;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: #22c55e; color: white; }

    .event-item {
      background: #f8f9fa;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border-left: 5px solid var(--primary);
    }
    [data-theme="dark"] .event-item { background: #2a2a2a; }

    .event-item.done {
      opacity: 0.75;
      text-decoration: line-through;
      border-left-color: #22c55e;
    }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card);
      padding: 25px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
    }
    [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
      background: #2a2a2a;
      color: white;
      border-color: #444;
    }

    .date-row {
      display: flex;
      gap: 10px;
    }
    .date-row select {
      flex: 1;
    }
  </style>
</head>
<body data-theme="light">

  <div class="header">
    <h2>Minha Agenda</h2>
    <button class="theme-toggle" id="themeToggle">☀️</button>
  </div>

  <!-- Tela Login -->
  <div id="authScreen" class="container" style="margin-top:40px;">
    <div style="background:var(--card);border-radius:16px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.15);">
      <h1 style="text-align:center;color:var(--primary);margin-bottom:25px;" id="authTitle">Entrar na Agenda</h1>
      
      <div id="loginForm">
        <input type="text" id="loginUsername" placeholder="Nome de usuário">
        <input type="password" id="loginPassword" placeholder="Senha">
        <button class="btn btn-primary" onclick="login()">Entrar</button>
        <div style="text-align:center;margin-top:15px;color:var(--primary);cursor:pointer;" onclick="showRegister()">Não tem conta? Cadastre-se</div>
      </div>

      <div id="registerForm" style="display:none;">
        <input type="text" id="regUsername" placeholder="Escolha um nome de usuário">
        <input type="password" id="regPassword" placeholder="Crie uma senha">
        <button class="btn btn-primary" onclick="register()">Cadastrar</button>
        <div style="text-align:center;margin-top:15px;color:var(--primary);cursor:pointer;" onclick="showLogin()">Já tem conta? Faça login</div>
      </div>
    </div>
  </div>

  <!-- Tela da Agenda -->
  <div id="appScreen" class="hidden container">
    <div class="calendar">
      <div class="calendar-header">
        <button id="prevMonth">‹</button>
        <h2 id="monthYear"></h2>
        <button id="nextMonth">›</button>
      </div>
      <div class="weekdays">
        <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
      </div>
      <div class="days" id="daysGrid"></div>
    </div>

    <div class="sidebar">
      <div class="selected-date" id="selectedDate">Selecione um dia</div>
      <button class="btn btn-primary" id="addEventBtn">+ Novo Compromisso</button>
      <h3 style="margin:20px 0 10px 0;">Compromissos do dia</h3>
      <div id="eventList"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Novo Compromisso</h2>
      
      <input type="text" id="eventTitle" placeholder="Título do compromisso" readonly>
      <input type="time" id="eventTime">
      <textarea id="eventDesc" rows="3" placeholder="Descrição (opcional)" readonly></textarea>

      <label style="margin-top:15px; display:block;">Nova Data:</label>
      <div class="date-row">
        <select id="rescheduleDay"></select>
        <select id="rescheduleMonth">
          <option value="0">Janeiro</option>
          <option value="1">Fevereiro</option>
          <option value="2">Março</option>
          <option value="3">Abril</option>
          <option value="4">Maio</option>
          <option value="5">Junho</option>
          <option value="6">Julho</option>
          <option value="7">Agosto</option>
          <option value="8">Setembro</option>
          <option value="9">Outubro</option>
          <option value="10">Novembro</option>
          <option value="11">Dezembro</option>
        </select>
      </div>

      <label style="margin-top:10px;">Cor:</label>
      <div style="display:flex;gap:12px;margin:12px 0;">
        <div class="color-option selected" data-color="#4a6cf7" style="width:32px;height:32px;border-radius:50%;background:#4a6cf7;"></div>
        <div class="color-option" data-color="#e74c3c" style="width:32px;height:32px;border-radius:50%;background:#e74c3c;"></div>
        <div class="color-option" data-color="#f39c12" style="width:32px;height:32px;border-radius:50%;background:#f39c12;"></div>
        <div class="color-option" data-color="#27ae60" style="width:32px;height:32px;border-radius:50%;background:#27ae60;"></div>
        <div class="color-option" data-color="#8e44ad" style="width:32px;height:32px;border-radius:50%;background:#8e44ad;"></div>
      </div>

      <div style="display:flex;gap:12px;margin-top:25px;">
        <button class="btn" style="background:#95a5a6;color:white;" id="cancelBtn">Cancelar</button>
        <button class="btn btn-primary" id="saveBtn">Salvar Remarcação</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== DADOS ====================
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('agendaUsers')) || {};
    let eventsDB = JSON.parse(localStorage.getItem('agendaEventsDB')) || {};
    let completedDays = JSON.parse(localStorage.getItem('completedDays')) || {};

    function saveData() {
      localStorage.setItem('agendaUsers', JSON.stringify(users));
      localStorage.setItem('agendaEventsDB', JSON.stringify(eventsDB));
      localStorage.setItem('completedDays', JSON.stringify(completedDays));
    }

    // Login, Tema, Calendário básico (mantidos iguais)
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('authTitle').textContent = "Entrar na Agenda";
    }
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('authTitle').textContent = "Criar Conta";
    }
    function register() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !password) return alert("Preencha todos os campos");
      if (users[username]) return alert("Usuário já existe!");
      users[username] = { password };
      completedDays[username] = [];
      saveData();
      alert("Conta criada com sucesso!");
      showLogin();
    }
    function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!users[username] || users[username].password !== password) return alert("Usuário ou senha incorretos!");
      currentUser = username;
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      renderCalendar();
      const today = new Date();
      selectDay(today.getDate(), today.getMonth(), today.getFullYear());
    }

    const themeToggle = document.getElementById('themeToggle');
    function toggleTheme() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('agendaTheme', isDark ? 'light' : 'dark');
    }
    if (localStorage.getItem('agendaTheme') === 'dark') {
      document.body.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '🌙';
    }
    themeToggle.onclick = toggleTheme;

    // ==================== CALENDÁRIO ====================
    let currentDate = new Date();
    let selectedDayKey = null;
    let currentEvents = {};

    function getUserEvents() {
      if (!currentUser) return {};
      if (!eventsDB[currentUser]) eventsDB[currentUser] = {};
      return eventsDB[currentUser];
    }

    function renderCalendar() {
      currentEvents = getUserEvents();
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('monthYear').textContent = 
        `${["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][month]} ${year}`;

      const daysGrid = document.getElementById('daysGrid');
      daysGrid.innerHTML = '';

      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();

      for (let i = firstDay - 1; i >= 0; i--) {
        const el = document.createElement('div');
        el.className = 'day other-month';
        el.innerHTML = `<div class="day-number">${new Date(year, month, 0).getDate() - i}</div>`;
        daysGrid.appendChild(el);
      }

      for (let day = 1; day <= lastDay; day++) {
        const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayEl = document.createElement('div');
        
        dayEl.className = `day ${dateKey === getTodayKey() ? 'today' : ''}`;
        
        // Nova lógica: verifica se TODOS os compromissos do dia estão feitos
        if (currentEvents[dateKey] && currentEvents[dateKey].length > 0) {
          const allDone = currentEvents[dateKey].every(ev => ev.done === true);
          if (allDone) dayEl.classList.add('all-done');
          else dayEl.classList.add('has-events');
        }

        dayEl.innerHTML = `<div class="day-number">${day}</div>`;
        dayEl.onclick = () => selectDay(day, month, year);
        daysGrid.appendChild(dayEl);
      }
    }

    function getTodayKey() {
      const t = new Date();
      return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    }

    function selectDay(day, month, year) {
      selectedDayKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dateObj = new Date(year, month, day);
      document.getElementById('selectedDate').textContent = 
        dateObj.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
      renderEventList();
    }

    function renderEventList() {
      const list = document.getElementById('eventList');
      list.innerHTML = '';
      const dayEvents = currentEvents[selectedDayKey] || [];

      if (dayEvents.length === 0) {
        list.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Nenhum compromisso neste dia</p>';
        return;
      }

      dayEvents.forEach((ev, i) => {
        const div = document.createElement('div');
        div.className = `event-item ${ev.done ? 'done' : ''}`;
        div.style.borderLeftColor = ev.color || '#4a6cf7';
        div.innerHTML = `
          <strong>${ev.time || 'Dia todo'}</strong> — ${ev.title}
          ${ev.desc ? `<p style="margin:8px 0 0 0;font-size:0.9rem;color:#666;">${ev.desc}</p>` : ''}
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
            <button onclick="toggleDone(${i})" class="btn btn-success" style="padding:6px 12px;font-size:0.9rem;">${ev.done ? 'Desfazer' : '✓ Feito'}</button>
            <button onclick="rescheduleEvent(${i})" style="background:#f39c12;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:0.9rem;">Remarcar</button>
            <button onclick="deleteEvent(${i})" style="background:#e74c3c;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:0.9rem;">Excluir</button>
            <button onclick="openWhatsApp()" style="background:#25D366;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:0.9rem;">WhatsApp</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    // ==================== FEITO - Agora atualiza cor do dia ====================
    window.toggleDone = function(index) {
      currentEvents[selectedDayKey][index].done = !currentEvents[selectedDayKey][index].done;
      saveData();
      renderEventList();
      renderCalendar();   // ← Atualiza o calendário para mudar a cor do dia
    };

    // ==================== OUTRAS FUNÇÕES (mantidas) ====================
    let rescheduleIndex = null;

    window.rescheduleEvent = function(index) {
      const event = currentEvents[selectedDayKey][index];
      if (!event) return;

      rescheduleIndex = index;

      document.getElementById('modalTitle').textContent = "Remarcar Compromisso";
      document.getElementById('eventTitle').value = event.title;
      document.getElementById('eventTime').value = event.time || '';
      document.getElementById('eventDesc').value = event.desc || '';

      document.getElementById('eventTitle').readOnly = true;
      document.getElementById('eventDesc').readOnly = true;

      const [year, month, day] = selectedDayKey.split('-').map(Number);
      const daySelect = document.getElementById('rescheduleDay');
      daySelect.innerHTML = '';
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (d === day) opt.selected = true;
        daySelect.appendChild(opt);
      }
      document.getElementById('rescheduleMonth').value = month - 1;

      document.getElementById('modal').style.display = 'flex';
    };

    document.getElementById('saveBtn').onclick = () => {
      if (rescheduleIndex !== null) {
        const oldEvent = currentEvents[selectedDayKey][rescheduleIndex];

        const newDay = parseInt(document.getElementById('rescheduleDay').value);
        const newMonth = parseInt(document.getElementById('rescheduleMonth').value);
        const newYear = currentDate.getFullYear();
        const newTime = document.getElementById('eventTime').value;

        const newDateKey = `${newYear}-${String(newMonth+1).padStart(2,'0')}-${String(newDay).padStart(2,'0')}`;

        currentEvents[selectedDayKey].splice(rescheduleIndex, 1);
        if (currentEvents[selectedDayKey].length === 0) delete currentEvents[selectedDayKey];

        if (!currentEvents[newDateKey]) currentEvents[newDateKey] = [];
        currentEvents[newDateKey].push({
          title: oldEvent.title,
          time: newTime,
          desc: oldEvent.desc,
          color: oldEvent.color,
          done: false
        });

        rescheduleIndex = null;
      } else {
        const title = document.getElementById('eventTitle').value.trim();
        if (!title) return alert("O título é obrigatório");
        if (!currentEvents[selectedDayKey]) currentEvents[selectedDayKey] = [];
        currentEvents[selectedDayKey].push({
          title,
          time: document.getElementById('eventTime').value,
          desc: document.getElementById('eventDesc').value,
          color: document.querySelector('.color-option.selected').dataset.color,
          done: false
        });
      }

      saveData();
      document.getElementById('modal').style.display = 'none';
      renderCalendar();
      renderEventList();
    };

    document.getElementById('cancelBtn').onclick = () => {
      rescheduleIndex = null;
      document.getElementById('modal').style.display = 'none';
    };

    document.getElementById('addEventBtn').onclick = () => {
      if (!selectedDayKey) return alert("Selecione um dia primeiro!");
      rescheduleIndex = null;
      document.getElementById('modalTitle').textContent = "Novo Compromisso";
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventTime').value = '';
      document.getElementById('eventDesc').value = '';
      document.getElementById('eventTitle').readOnly = false;
      document.getElementById('eventDesc').readOnly = false;
      document.getElementById('modal').style.display = 'flex';
    };

    window.deleteEvent = function(index) {
      if (confirm("Excluir este compromisso?")) {
        currentEvents[selectedDayKey].splice(index, 1);
        if (currentEvents[selectedDayKey].length === 0) delete currentEvents[selectedDayKey];
        saveData();
        renderCalendar();
        renderEventList();
      }
    };

    window.openWhatsApp = function() {
      window.open("https://wa.me/", "_blank");
    };

    document.querySelectorAll('.color-option').forEach(opt => {
      opt.onclick = () => {
        document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      };
    });

    document.getElementById('prevMonth').onclick = () => { 
      currentDate.setMonth(currentDate.getMonth()-1); 
      renderCalendar(); 
    };
    document.getElementById('nextMonth').onclick = () => { 
      currentDate.setMonth(currentDate.getMonth()+1); 
      renderCalendar(); 
    };

    // Inicialização
    showLogin();
  </script>
</body>
</html>
